name: Production Checks

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run Linting
      run: npm run lint
      
    - name: Typecheck
      run: npx tsc --noEmit
      
    - name: Dependency Audit
      run: npm audit || true # Fails only if critical, currently || true prevents breaking on medium vulns
      
    - name: Run Build
      env:
        # Dummy keys so build can succeed statically without exposing production keys
        NEXT_PUBLIC_SUPABASE_URL: "https://dummy.supabase.co"
        NEXT_PUBLIC_SUPABASE_ANON_KEY: "dummy"
        SUPABASE_SERVICE_ROLE_KEY: "dummy"
        STRIPE_SECRET_KEY: "dummy"
        STRIPE_WEBHOOK_SECRET: "dummy"
        PAYPAL_CLIENT_ID: "dummy"
        PAYPAL_SECRET: "dummy"
        RESEND_API_KEY: "dummy"
      run: npm run build
      
    - name: Run Smoke Tests
      env:
        STRIPE_WEBHOOK_SECRET: "whsec_dummy"
      run: node tests/smoke.test.js
